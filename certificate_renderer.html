<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 1rem;
  }

  #controls {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    padding: 0.9rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    flex-wrap: wrap;
    width: 100%;
    max-width: 960px;
  }

  #controls .label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    white-space: nowrap;
  }

  #field-preview { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }

  .field-tag {
    background: #0D4A47;
    color: #2BBFB0;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  #print-btn {
    background: #2BBFB0;
    color: #0D4A47;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    margin-left: auto;
  }
  #print-btn:hover { background: #23a89e; }

  #edit-btn {
    background: transparent;
    color: #2BBFB0;
    border: 1px solid #2BBFB0;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  #edit-btn:hover { background: #2BBFB022; }
  #edit-btn.active { background: #2BBFB0; color: #0D4A47; }

  #editor-bar {
    display: none;
    background: #0D4A47;
    border-radius: 10px;
    padding: 0.9rem 1.4rem;
    width: 100%;
    max-width: 960px;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }
  #editor-bar.visible { display: flex; }

  #editor-bar .hint {
    font-size: 12px;
    color: #2BBFB0;
    flex: 1;
    line-height: 1.5;
  }

  #copy-config-btn {
    background: #2BBFB0;
    color: #0D4A47;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #copy-config-btn.copied { background: #1a7a50; color: white; }

  #config-output {
    display: none;
    width: 100%;
    max-width: 960px;
    background: #0a2220;
    color: #2BBFB0;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 6px;
    padding: 12px;
    white-space: pre;
    overflow-x: auto;
    line-height: 1.6;
    border: none;
    resize: none;
  }
  #config-output.visible { display: block; }

  #cert-wrapper {
    position: relative;
    width: 960px;
    max-width: 100%;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  #cert-bg {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
  }

  .cert-field {
    position: absolute;
    white-space: nowrap;
    line-height: 1.3;
    transform: translateX(-50%);
    pointer-events: none;
    cursor: default;
  }

  body.edit-mode .cert-field {
    pointer-events: all;
    cursor: grab;
    outline: 1.5px dashed #2BBFB0;
    outline-offset: 4px;
    border-radius: 2px;
  }
  body.edit-mode .cert-field:hover { outline-color: white; }
  body.edit-mode .cert-field.dragging { cursor: grabbing; outline-color: #fff; z-index: 10; }

  #error-msg {
    display: none;
    background: #3a1a1a;
    border: 1px solid #8B3A3A;
    color: #f5a0a0;
    border-radius: 8px;
    padding: 1rem 1.5rem;
    font-size: 14px;
    max-width: 960px;
    width: 100%;
  }

  #no-bg-notice {
    display: none;
    position: absolute;
    inset: 0;
    background: #f0ece4;
    align-items: center;
    justify-content: center;
    color: #9a9080;
    font-size: 14px;
  }

  @media print {
    @page {
      size: A4 landscape;
      margin: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: white;
    }
    #controls, #editor-bar, #config-output { display: none !important; }
    #cert-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      max-width: none;
      box-shadow: none;
      border-radius: 0;
    }
    #cert-bg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  }
</style>
</head>
<body>

<div id="error-msg"></div>

<div id="controls">
  <span class="label">Certificate data</span>
  <div id="field-preview"></div>
  <button id="edit-btn" onclick="toggleEdit()">✦ Adjust positions</button>
  <button id="print-btn" onclick="window.print()">Save as PDF ↓</button>
</div>

<div id="editor-bar">
  <span class="hint">Drag any field to reposition it. Use the font size controls below to adjust size. When done, copy config and paste it into the TEMPLATES section of this file.</span>
  <button id="copy-config-btn" onclick="copyConfig()">Copy config</button>
</div>
<textarea id="config-output" readonly rows="22"></textarea>

<div id="cert-wrapper">
  <div id="no-bg-notice">[ No template image configured ]</div>
  <img id="cert-bg" src="" alt="Certificate background" />
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// TEMPLATE CONFIGURATION — edit positions here, or use the
// "Adjust positions" button to drag fields directly on the certificate
// ─────────────────────────────────────────────────────────────────
const TEMPLATES = {

  // Fields shown: Real Name, Event Title, Event Date, Issue Date
  "audio-interview": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/audio-interview.png",
    fields: {
      "Real Name":   { left: 50.42, top: 45.06, fontSize: 28, fontFamily: "'EB Garamond', serif",    fontWeight: 600, fontStyle: "normal", color: "#0D4A47" },
      "Event Title": { left: 50,    top: 59,    fontSize: 18, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#1a1a1a" },
      "Event Date":  { left: 59.31, top: 67.29, fontSize: 16, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Issue Date":  { left: 84.58, top: 82.15, fontSize: 14, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#666"    }
    }
  },

  // Fields shown: Real Name, Event Title, Presentation Title, Event Date, Issue Date
  "conference": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/conference.png",
    fields: {
      "Real Name":          { left: 50.21, top: 44.36, fontSize: 32, fontFamily: "'EB Garamond', serif",    fontWeight: 600, fontStyle: "normal", color: "#0D4A47" },
      "Event Title":        { left: 50,    top: 55.77, fontSize: 18, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#1a1a1a" },
      "Presentation Title": { left: 50,    top: 63,    fontSize: 16, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "italic", color: "#333"    },
      "Event Date":         { left: 40.31, top: 71.49, fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Issue Date":         { left: 18.96, top: 83.26, fontSize: 13, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#666"    }
    }
  },

  // Fields shown: Real Name, Date Range, Issue Date
  "lc-1": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/lc-1.png",
    fields: {
      "Real Name":  { left: 50.1,  top: 44.65, fontSize: 32, fontFamily: "'EB Garamond', serif",    fontWeight: 600, fontStyle: "normal", color: "#0D4A47" },
      "Date Range": { left: 65.94, top: 71.78, fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Issue Date": { left: 80,    top: 82.37, fontSize: 13, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#666"    }
    }
  },

  // Fields shown: Real Name, Date Range, Issue Date
  "lc-2": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/lc-2.png",
    fields: {
      "Real Name":  { left: 50.1,  top: 44.65, fontSize: 32, fontFamily: "'EB Garamond', serif",    fontWeight: 600, fontStyle: "normal", color: "#0D4A47" },
      "Date Range": { left: 65.94, top: 71.78, fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Issue Date": { left: 80,    top: 82.37, fontSize: 13, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#666"    }
    }
  },

  // Fields shown: Real Name, Event Title, Presentation Title, Event Date, Issue Date
  "round-table": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/round-table.png",
    fields: {
      "Real Name":          { left: 50.21, top: 44.36, fontSize: 32, fontFamily: "'EB Garamond', serif",    fontWeight: 600, fontStyle: "normal", color: "#0D4A47" },
      "Event Title":        { left: 50,    top: 55.77, fontSize: 18, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#1a1a1a" },
      "Presentation Title": { left: 50,    top: 63,    fontSize: 16, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "italic", color: "#333"    },
      "Event Date":         { left: 40.31, top: 71.49, fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Issue Date":         { left: 18.96, top: 83.26, fontSize: 13, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#666"    }
    }
  },

  // Fields shown: Real Name, Event Title, Event Date, Issue Date
  "training-lecturer": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/training-lecturer.png",
    fields: {
      "Real Name":   { left: 50.83, top: 44.36, fontSize: 32, fontFamily: "'EB Garamond', serif",    fontWeight: 600, fontStyle: "normal", color: "#0D4A47" },
      "Event Title": { left: 50,    top: 58.57, fontSize: 18, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#1a1a1a" },
      "Event Date":  { left: 58.96, top: 68.24, fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Issue Date":  { left: 79.06, top: 82.52, fontSize: 13, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#666"    }
    }
  },

  // Fields shown: Real Name, Event Title, Event Date, Hours, Issue Date
  "training-participant": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/training-participant.png",
    fields: {
      "Real Name":   { left: 50.21, top: 44.51, fontSize: 32, fontFamily: "'EB Garamond', serif",    fontWeight: 600, fontStyle: "normal", color: "#0D4A47" },
      "Event Title": { left: 50,    top: 58.72, fontSize: 18, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#1a1a1a" },
      "Event Date":  { left: 67.19, top: 71.63, fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Hours":       { left: 50,    top: 71,    fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Issue Date":  { left: 78.96, top: 82.52, fontSize: 13, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#666"    }
    }
  },

  // Fields shown: Real Name, Event Title, Event Date, Hours, Issue Date
  "workshop": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/workshop.png",
    fields: {
      "Real Name":   { left: 50.21, top: 44.51, fontSize: 32, fontFamily: "'EB Garamond', serif",    fontWeight: 600, fontStyle: "normal", color: "#0D4A47" },
      "Event Title": { left: 50,    top: 58.72, fontSize: 18, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#1a1a1a" },
      "Event Date":  { left: 67.19, top: 71.63, fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Hours":       { left: 50,    top: 71,    fontSize: 15, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#333"    },
      "Issue Date":  { left: 78.96, top: 82.52, fontSize: 13, fontFamily: "'Montserrat', sans-serif", fontWeight: 400, fontStyle: "normal", color: "#666"    }
    }
  }

};

// ─────────────────────────────────────────────────────────────────
// Runtime
// ─────────────────────────────────────────────────────────────────
(function () {
  const params  = new URLSearchParams(window.location.search);
  const tmplKey = params.get("template") || "";
  const data = {
    "Real Name":          params.get("name")                || "Anna Kowalska",
    "Event Title":        params.get("event_title")         || "Belarusian Science Today",
    "Presentation Title": params.get("presentation_title")  || "",
    "Event Date":         params.get("event_date")           || "15.04.2025",
    "Date Range":         params.get("date_range")           || "",
    "Hours":              params.get("hours")                || "",
    "Issue Date":         params.get("issue_date")           || new Date().toLocaleDateString("de-DE")
  };

  const errorEl = document.getElementById("error-msg");
  const wrapper = document.getElementById("cert-wrapper");
  const bgImg   = document.getElementById("cert-bg");
  const noBgEl  = document.getElementById("no-bg-notice");
  const preview = document.getElementById("field-preview");

  // Preview tags in control bar
  ["Real Name", "Event Title", "Event Date"].forEach(f => {
    if (data[f]) {
      const tag = document.createElement("span");
      tag.className = "field-tag";
      tag.textContent = data[f];
      preview.appendChild(tag);
    }
  });

  // Validate template
  if (!tmplKey || !TEMPLATES[tmplKey]) {
    errorEl.style.display = "block";
    errorEl.textContent = `Unknown template "${tmplKey}". Available: ${Object.keys(TEMPLATES).join(", ")}`;
    return;
  }

  const tmpl = TEMPLATES[tmplKey];

  // Live positions — mutated by dragging
  const pos = {};
  Object.entries(tmpl.fields).forEach(([k, v]) => {
    pos[k] = { left: v.left, top: v.top };
  });

  // Load background
  bgImg.src = tmpl.backgroundUrl;
  bgImg.onerror = () => { noBgEl.style.display = "flex"; bgImg.style.display = "none"; };

  // Render all fields
  const fieldEls = {};

  function getScaledFontSize(cfg) {
    const w = wrapper.offsetWidth || 960;
    return (cfg.fontSize * w / 960).toFixed(1) + "px";
  }

  function renderFields() {
    wrapper.querySelectorAll(".cert-field").forEach(e => e.remove());
    Object.entries(tmpl.fields).forEach(([fieldName, cfg]) => {
      const value = data[fieldName];
      if (!value) return;

      const el = document.createElement("div");
      el.className = "cert-field";
      el.textContent = value;
      el.dataset.field = fieldName;

      el.style.left       = pos[fieldName].left + "%";
      el.style.top        = pos[fieldName].top  + "%";
      el.style.fontSize   = getScaledFontSize(cfg);
      el.style.fontFamily = cfg.fontFamily;
      el.style.fontWeight = cfg.fontWeight;
      el.style.fontStyle  = cfg.fontStyle;
      el.style.color      = cfg.color;
      el.style.transform  = "translateX(-50%)";

      wrapper.appendChild(el);
      fieldEls[fieldName] = el;
      makeDraggable(el, fieldName);
    });
  }

  function recalcFonts() {
    Object.entries(tmpl.fields).forEach(([fieldName, cfg]) => {
      const el = fieldEls[fieldName];
      if (el) el.style.fontSize = getScaledFontSize(cfg);
    });
  }

  bgImg.addEventListener("load", () => { renderFields(); recalcFonts(); });
  window.addEventListener("load", recalcFonts);
  new ResizeObserver(recalcFonts).observe(wrapper);

  // ── Drag ──
  function makeDraggable(el, fieldName) {
    let active = false, startX, startY, startLeft, startTop;

    const begin = (cx, cy) => {
      if (!document.body.classList.contains("edit-mode")) return;
      active    = true;
      startX    = cx;
      startY    = cy;
      startLeft = pos[fieldName].left;
      startTop  = pos[fieldName].top;
      el.classList.add("dragging");
    };

    const move = (cx, cy) => {
      if (!active) return;
      const rect = wrapper.getBoundingClientRect();
      pos[fieldName].left = +Math.min(99, Math.max(1, startLeft + (cx - startX) / rect.width  * 100)).toFixed(2);
      pos[fieldName].top  = +Math.min(99, Math.max(1, startTop  + (cy - startY) / rect.height * 100)).toFixed(2);
      el.style.left = pos[fieldName].left + "%";
      el.style.top  = pos[fieldName].top  + "%";
      refreshConfig();
    };

    const end = () => { active = false; el.classList.remove("dragging"); };

    el.addEventListener("mousedown",  e => { begin(e.clientX, e.clientY); e.preventDefault(); });
    window.addEventListener("mousemove", e => move(e.clientX, e.clientY));
    window.addEventListener("mouseup",   end);
    el.addEventListener("touchstart", e => begin(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    window.addEventListener("touchmove",  e => move(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener("touchend",   end);
  }

  // ── Edit mode ──
  window.toggleEdit = function () {
    const on = document.body.classList.toggle("edit-mode");
    document.getElementById("edit-btn").classList.toggle("active", on);
    document.getElementById("editor-bar").classList.toggle("visible", on);
    if (on) refreshConfig();
    else document.getElementById("config-output").classList.remove("visible");
  };

  // ── Config output ──
  function refreshConfig() {
    const lines = Object.entries(tmpl.fields).map(([fieldName, cfg]) => {
      const p = pos[fieldName];
      return `      "${fieldName}": {\n` +
             `        left: ${p.left}, top: ${p.top},\n` +
             `        fontSize: ${cfg.fontSize}, fontFamily: ${JSON.stringify(cfg.fontFamily)},\n` +
             `        fontWeight: ${cfg.fontWeight}, fontStyle: "${cfg.fontStyle}",\n` +
             `        color: "${cfg.color}"\n` +
             `      }`;
    }).join(",\n");
    const out = document.getElementById("config-output");
    out.value = `    fields: {\n${lines}\n    }`;
    out.classList.add("visible");
  }

  window.copyConfig = function () {
    navigator.clipboard.writeText(document.getElementById("config-output").value).then(() => {
      const btn = document.getElementById("copy-config-btn");
      btn.textContent = "✓ Copied!";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "Copy config"; btn.classList.remove("copied"); }, 2000);
    });
  };

})();
</script>
</body>
</html>
