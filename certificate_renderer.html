<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap');
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: #1a1a1a;
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 1.5rem;
  }
 
  /* ── Control bar (hidden when printing) ── */
  #controls {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    width: 100%;
    max-width: 960px;
  }
 
  #controls .label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    white-space: nowrap;
  }
 
  #field-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex: 1;
  }
 
  .field-tag {
    background: #0D4A47;
    color: #2BBFB0;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
 
  #print-btn {
    background: #2BBFB0;
    color: #0D4A47;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    letter-spacing: 0.03em;
    margin-left: auto;
  }
  #print-btn:hover { background: #23a89e; }
 
  /* ── Certificate canvas ── */
  #cert-wrapper {
    position: relative;
    width: 960px;
    max-width: 100%;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    /* height is determined by the image's natural aspect ratio */
  }
 
  #cert-bg {
    /* Block-level so the wrapper grows to fit the image height */
    display: block;
    width: 100%;
    height: auto;
  }
 
  /* Each field is absolutely positioned via inline style */
  .cert-field {
    position: absolute;
    white-space: nowrap;
    line-height: 1.3;
    text-align: left;
    transform: translateX(-50%);
    pointer-events: none;
  }
 
  /* ── Error / loading states ── */
  #error-msg {
    display: none;
    background: #3a1a1a;
    border: 1px solid #8B3A3A;
    color: #f5a0a0;
    border-radius: 8px;
    padding: 1rem 1.5rem;
    font-size: 14px;
    max-width: 960px;
    width: 100%;
  }
 
  #no-bg-notice {
    display: none;
    position: absolute;
    inset: 0;
    background: #f0ece4;
    align-items: center;
    justify-content: center;
    color: #9a9080;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
 
  /* ── Print styles ── */
  @media print {
    body {
      background: white;
      padding: 0;
      gap: 0;
    }
    #controls { display: none !important; }
    #cert-wrapper {
      width: 100vw;
      max-width: 100vw;
      box-shadow: none;
      border-radius: 0;
    }
    #cert-bg {
      width: 100%;
      height: auto;
    }
  }
</style>
</head>
<body>
 
<div id="error-msg"></div>
 
<div id="controls">
  <span class="label">Certificate data</span>
  <div id="field-preview"></div>
  <button id="print-btn" onclick="window.print()">Save as PDF ↓</button>
</div>
 
<div id="cert-wrapper">
  <div id="no-bg-notice">[ No template image configured for this certificate type ]</div>
  <img id="cert-bg" src="" alt="Certificate background" />
  <!-- Fields injected here by JS -->
</div>


<script>
// ─────────────────────────────────────────────────────────────────
// TEMPLATE CONFIGURATION
// One entry per template. Key must match the "template" URL param.
//
// For each field:
//   left    — horizontal center of the text block, as % of cert width
//   top     — vertical position of the text top, as % of cert height
//   fontSize — in px (at 960px cert width; scales automatically)
//   fontFamily — any Google Font loaded above, or a web-safe font
//   fontWeight — 400 | 600
//   fontStyle  — "normal" | "italic"
//   color   — any CSS color value
//   maxWidth — max width of text block as % of cert width
//
// HOW TO FIND POSITIONS:
//   1. Open your PNG template in PowerPoint / any image editor
//   2. Note the canvas size (e.g. 1920×1358 px)
//   3. For each field placeholder, note its center X and top Y
//   4. Divide: left% = centerX / width * 100, top% = topY / height * 100
// ─────────────────────────────────────────────────────────────────
const TEMPLATES = {

  "audio-interview": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/audio-interview.png",
 fields: {
      "Real Name": {
        left: 40.9, top: 43.8,
        fontSize: 28, fontFamily: "'EB Garamond', serif",
        fontWeight: 600, fontStyle: "normal",
        color: "#0D4A47", maxWidth: 70
      },
      "Event Title": {
        left: 39.7, top: 60.3,
        fontSize: 18, fontFamily: "'Montserrat', sans-serif",
        fontWeight: 400, fontStyle: "normal",
        color: "#1a1a1a", maxWidth: 70
      },
      "Event Date": {
        left: 52.7, top: 66.7,
        fontSize: 16, fontFamily: "'Montserrat', sans-serif",
        fontWeight: 400, fontStyle: "normal",
        color: "#333", maxWidth: 70
      },
      "Issue Date": {
        left: 81.9, top: 81.6,
        fontSize: 14, fontFamily: "'Montserrat', sans-serif",
        fontWeight: 400, fontStyle: "normal",
        color: "#666", maxWidth: 70
      }
    }
    },

  "conference": {
    backgroundUrl: "https://aknoev.github.io/certificate-tool/conference.png",
    fields: {
      "Real Name": {
        left: 50, top: 38,
        fontSize: 40, fontFamily: "'EB Garamond', serif",
        fontWeight: 600, fontStyle: "normal",
        color: "#1a1a1a", maxWidth: 72
      },
      "Event Title": {
        left: 50, top: 50,
        fontSize: 17, fontFamily: "'Montserrat', sans-serif",
        fontWeight: 500, fontStyle: "normal",
        color: "#0D4A47", maxWidth: 68
      },
      "Event Date": {
        left: 50, top: 61,
        fontSize: 15, fontFamily: "'Montserrat', sans-serif",
        fontWeight: 400, fontStyle: "normal",
        color: "#444", maxWidth: 40
      },
      "Issue Date": {
        left: 50, top: 70,
        fontSize: 13, fontFamily: "'Montserrat', sans-serif",
        fontWeight: 400, fontStyle: "normal",
        color: "#888", maxWidth: 40
      }
    }
  },

  // ── Add more templates following the same pattern ──
  // "template-key": { backgroundUrl: "...", fields: { ... } }

};

// ─────────────────────────────────────────────────────────────────
// Runtime — reads URL params and renders the certificate
// ─────────────────────────────────────────────────────────────────
(function () {
  const params  = new URLSearchParams(window.location.search);
  const tmplKey = params.get("template") || "";
  const data    = {
    "Real Name":   params.get("name")        || "",
    "Event Title": params.get("event_title") || "",
    "Event Date":  params.get("event_date")  || "",
    "Issue Date":  params.get("issue_date")  || new Date().toLocaleDateString("de-DE")
  };

  const errorEl  = document.getElementById("error-msg");
  const wrapper  = document.getElementById("cert-wrapper");
  const bgImg    = document.getElementById("cert-bg");
  const noBgEl   = document.getElementById("no-bg-notice");
  const preview  = document.getElementById("field-preview");

  // Show field preview tags in control bar
  const previewFields = ["Real Name", "Event Title", "Event Date"];
  previewFields.forEach(f => {
    if (data[f]) {
      const tag = document.createElement("span");
      tag.className = "field-tag";
      tag.textContent = data[f];
      preview.appendChild(tag);
    }
  });

  // Validate template key
  if (!tmplKey || !TEMPLATES[tmplKey]) {
    errorEl.style.display = "block";
    errorEl.textContent = `Unknown template "${tmplKey}". Available templates: ${Object.keys(TEMPLATES).join(", ")}`;
    return;
  }

  const tmpl = TEMPLATES[tmplKey];

  // Set background image
  if (tmpl.backgroundUrl && !tmpl.backgroundUrl.startsWith("REPLACE")) {
    bgImg.src = tmpl.backgroundUrl;
    bgImg.onerror = () => {
      noBgEl.style.display = "flex";
      bgImg.style.display = "none";
    };
  } else {
    noBgEl.style.display = "flex";
    bgImg.style.display = "none";
  }

  // Render text fields
  Object.entries(tmpl.fields).forEach(([fieldName, cfg]) => {
    const value = data[fieldName];
    if (!value) return;

    const el = document.createElement("div");
    el.className = "cert-field";
    el.textContent = value;

    // Scale font size proportionally to current wrapper width
    const BASE_WIDTH = 960;
    const scaledSize = (cfg.fontSize / BASE_WIDTH * 100).toFixed(3);

    el.style.cssText = `
      left: ${cfg.left}%;
      top: ${cfg.top}%;
      font-size: ${scaledSize}vw;
      font-family: ${cfg.fontFamily};
      font-weight: ${cfg.fontWeight};
      font-style: ${cfg.fontStyle};
      color: ${cfg.color};
      max-width: ${cfg.maxWidth}%;
      transform: translateX(-50%);
    `;

    // Clamp vw font to container width (not viewport)
    // Use ResizeObserver to set px font after mount
    wrapper.appendChild(el);
  });

  // After images + fonts load, recalc font sizes relative to wrapper width
  function recalcFonts() {
    const w = wrapper.offsetWidth;
    wrapper.querySelectorAll(".cert-field").forEach(el => {
      const fieldName = Object.keys(tmpl.fields).find(
        k => el.textContent === (data[k] || "")
      );
      if (!fieldName) return;
      const cfg = tmpl.fields[fieldName];
      el.style.fontSize = (cfg.fontSize * w / 960) + "px";
    });
  }

  window.addEventListener("load", recalcFonts);
  new ResizeObserver(recalcFonts).observe(wrapper);

})();
</script>
</body>
</html>
